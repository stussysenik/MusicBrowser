name: MusicBrowser
options:
  bundleIdPrefix: com.musicbrowser
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  MusicBrowser:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: MusicBrowser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.musicbrowser.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: MusicBrowser/Info.plist
        PRODUCT_NAME: MusicBrowser
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 95MF6RX2GK
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
      groups:
        - platform:iOS:
            CODE_SIGN_ENTITLEMENTS: MusicBrowser.entitlements
        - platform:macOS:
            CODE_SIGN_ENTITLEMENTS: MusicBrowser.macOS.entitlements
