name: MusicBrowser
options:
  bundleIdPrefix: com.musicbrowser
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
schemes:
  MusicBrowser:
    build:
      targets:
        MusicBrowser: all
        MusicBrowserTests: [test]
    test:
      targets:
        - name: MusicBrowserTests
targets:
  MusicBrowser:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: MusicBrowser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.musicbrowser.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: MusicBrowser/Info.plist
        PRODUCT_NAME: MusicBrowser
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 95MF6RX2GK
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": MusicBrowser.macOS.entitlements
  MusicBrowserTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: MusicBrowserTests
    dependencies:
      - target: MusicBrowser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.musicbrowser.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MusicBrowser
      groups:
        - platform:iOS:
            TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MusicBrowser.app/MusicBrowser"
            BUNDLE_LOADER: "$(TEST_HOST)"
        - platform:macOS:
            TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MusicBrowser.app/Contents/MacOS/MusicBrowser"
            BUNDLE_LOADER: "$(TEST_HOST)"
